name: Release

env:
  JAVA_OPTS: "-Xms512m -Xmx6048m -Xss128m -XX:ReservedCodeCacheSize=512m -server"
  GRADLE_OPTS: "-Xms512m -Xmx6048m -Xss128m -XX:ReservedCodeCacheSize=512m -server"
  TERM: xterm-256color
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JDK_CURRENT: 21
  JDK_DISTRIBUTION: "corretto"

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}"
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release Version (Must NOT be a -SNAPSHOT version; i.e. 8.0.0)"
        required: true
        type: string
      nextVersion:
        description: "Next Version (Optional; must be a -SNAPSHOT version; i.e. 8.0.1-SNAPSHOT)"
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      is_snapshot: ${{ steps.check.outputs.is_snapshot }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: check
        run: |
          RELEASE_VERSION="${{ inputs.releaseVersion }}"
          echo "Detected release version: $RELEASE_VERSION"
          if [[ "$RELEASE_VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true"
          else
            echo "is_snapshot=false"
          fi \
          >> $GITHUB_OUTPUT
  release-to-central:
    runs-on: ubuntu-latest
    needs: [ check ]
    if: needs.check.outputs.is_snapshot == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Release CAS ${{ inputs.releaseVersion }}
        run: |
          RELEASE_VERSION="${{ inputs.releaseVersion }}"
          if [ -z "${{ inputs.nextVersion }}" ]; then
            NEXT_VERSION="7.2.1-SNAPSHOT"
          else
            NEXT_VERSION="${{ inputs.nextVersion }}"
          fi
          echo "Done: RELEASE_VERSION=$RELEASE_VERSION NEXT_VERSION=$NEXT_VERSION"
